apiVersion: v1
kind: ServiceAccount
metadata:
  name: backups-microservice
  namespace: statex-apps
  labels:
    app: backups-microservice
    managed-by: k8s-migration
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backups-microservice-discovery
  labels:
    app: backups-microservice
    managed-by: k8s-migration
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backups-microservice-discovery
  labels:
    app: backups-microservice
    managed-by: k8s-migration
subjects:
  - kind: ServiceAccount
    name: backups-microservice
    namespace: statex-apps
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: backups-microservice-discovery
