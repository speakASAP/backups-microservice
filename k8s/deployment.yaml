apiVersion: apps/v1
kind: Deployment
metadata:
  name: backups-microservice
  namespace: statex-apps
  labels:
    app: backups-microservice
    managed-by: k8s-migration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backups-microservice
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: backups-microservice
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z db-server-postgres 5432; do echo waiting for postgres; sleep 2; done']
      containers:
        - name: app
          image: localhost:5000/backups-microservice:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3398
              name: http
          envFrom:
            - configMapRef:
                name: backups-microservice-config
            - secretRef:
                name: backups-microservice-secret
          startupProbe:
            httpGet:
              path: /health
              port: 3398
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3398
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3398
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
