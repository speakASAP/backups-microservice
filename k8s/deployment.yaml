apiVersion: apps/v1
kind: Deployment
metadata:
  name: backups-microservice
  namespace: statex-apps
  labels:
    app: backups-microservice
    managed-by: k8s-migration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backups-microservice
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: backups-microservice
    spec:
      serviceAccountName: backups-microservice
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z db-server-postgres 5432; do echo waiting for postgres; sleep 2; done']
      containers:
        - name: app
          image: localhost:5000/backups-microservice:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3398
              name: http
          env:
            - name: DATABASE_SERVER_BACKUP_EVIDENCE_PATH
              value: /var/lib/backups-evidence/database-server/latest.json
            - name: VAULT_BACKUP_EVIDENCE_PATH
              value: /var/lib/backups-evidence/vault/latest.json
          envFrom:
            - configMapRef:
                name: backups-microservice-config
            - secretRef:
                name: backups-microservice-secret
          volumeMounts:
            - name: database-server-evidence
              mountPath: /var/lib/backups-evidence/database-server
              readOnly: true
            - name: vault-evidence
              mountPath: /var/lib/backups-evidence/vault
              readOnly: true
          startupProbe:
            httpGet:
              path: /health
              port: 3398
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3398
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 3398
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: database-server-evidence
          hostPath:
            path: /home/ssf/Documents/Github/database-server/backup-evidence
            type: DirectoryOrCreate
        - name: vault-evidence
          hostPath:
            path: /home/ssf/Documents/Github/shared/runtime-evidence/vault-backups
            type: DirectoryOrCreate
