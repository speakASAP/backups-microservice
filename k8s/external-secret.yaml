apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backups-microservice-secret
  namespace: statex-apps
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: backups-microservice-secret
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: secret/prod/backups-microservice
        property: DB_PASSWORD
    - secretKey: JWT_SECRET
      remoteRef:
        key: secret/prod/backups-microservice
        property: JWT_SECRET
    - secretKey: MINIO_ACCESS_KEY
      remoteRef:
        key: secret/prod/backups-microservice
        property: MINIO_ACCESS_KEY
    - secretKey: MINIO_SECRET_KEY
      remoteRef:
        key: secret/prod/backups-microservice
        property: MINIO_SECRET_KEY
    - secretKey: SERVICE_TOKEN
      remoteRef:
        key: secret/prod/backups-microservice
        property: SERVICE_TOKEN
    - secretKey: NOTIFICATIONS_SERVICE_TOKEN
      remoteRef:
        key: secret/prod/backups-microservice
        property: NOTIFICATIONS_SERVICE_TOKEN

    - secretKey: JWT_TOKEN
      remoteRef:
        key: secret/prod/backups-microservice
        property: JWT_TOKEN
