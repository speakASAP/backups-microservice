apiVersion: v1
kind: ConfigMap
metadata:
  name: backups-microservice-config
  namespace: statex-apps
  labels:
    app: backups-microservice
    managed-by: k8s-migration
data:
  NODE_ENV: "production"
  SERVICE_NAME: "backups-microservice"
  DOMAIN: "backups.alfares.cz"
  PORT: "3398"
  CORS_ORIGIN: "https://backups.alfares.cz"
  AUTH_SERVICE_URL: "http://auth-microservice.statex-apps.svc.cluster.local:3370"
  LOGGING_SERVICE_URL: "http://logging-microservice.statex-apps.svc.cluster.local:3367"
  NOTIFICATIONS_SERVICE_URL: "http://notifications-microservice.statex-apps.svc.cluster.local:3368"
  MONITORING_SERVICE_URL: "http://monitoring-microservice.statex-apps.svc.cluster.local:3395"
  MINIO_ENDPOINT: "http://minio-microservice.statex-apps.svc.cluster.local:9000"
  MINIO_BUCKET: "backups"
  DB_HOST: "db-server-postgres"
  DB_PORT: "5432"
  DB_USER: "dbadmin"
  DB_NAME: "backups"
  DB_SCHEMA: "backups"
  WALG_S3_PREFIX: "s3://backups"
  WALG_S3_ENDPOINT: "http://minio-microservice.statex-apps.svc.cluster.local:9000"
  WALG_COMPRESSION_METHOD: "lz4"
  BACKUP_SCHEDULE_DB: "0 2 * * *"
  BACKUP_RETENTION_DAYS: "30"
